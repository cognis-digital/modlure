name: ports
on: [push, pull_request]
permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - run: go vet ./...
      - run: go test -v ./...
      - run: go build -o /tmp/modpot-go .
      - name: smoke (write frame exits 1)
        run: |
          set +e
          echo 000200000006010600010001 | /tmp/modpot-go
          test $? -eq 1

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo build --release
      - name: smoke (read frame exits 0)
        run: echo 000100000006010300000001 | ./target/release/modpot

  javascript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node test.js

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm test
