apiVersion: apps/v1
kind: Deployment
metadata: { name: modlure, labels: { app: modlure } }
spec:
  replicas: 1
  selector: { matchLabels: { app: modlure } }
  template:
    metadata: { labels: { app: modlure } }
    spec:
      containers:
        - name: modlure
          image: ghcr.io/cognis-digital/modlure:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: modlure }
spec:
  selector: { app: modlure }
  ports: [{ port: 80, targetPort: 8000 }]
